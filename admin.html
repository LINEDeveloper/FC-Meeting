<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quiz System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <header class="bg-gradient-to-r from-slate-800 to-slate-900 shadow-md py-4 px-6 shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-inner">
                <span class="text-xl">📊</span>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white leading-tight">Admin Dashboard</h1>
                <p class="text-xs text-slate-300">FC Meeting Quiz Overview</p>
            </div>
        </div>
        <button onclick="loadDashboardData()" class="text-slate-300 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <div id="loadingState" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-gray-500 font-medium">กำลังดึงข้อมูลล่าสุด...</p>
            </div>

            <div id="dashboardContent" class="hidden space-y-6 animate-[fade-in-up_0.5s_ease-out]">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 text-2xl shrink-0">👥</div>
                        <div>
                            <p class="text-sm font-bold text-gray-400 uppercase tracking-wider">เข้าสอบแล้ว / เป้าหมาย</p>
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black text-gray-800" id="valTested">0</span>
                                <span class="text-lg font-medium text-gray-500">/ <span id="valTarget">0</span> คน</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center text-green-600 text-2xl shrink-0">📈</div>
                        <div>
                            <p class="text-sm font-bold text-gray-400 uppercase tracking-wider">คิดเป็นเปอร์เซ็นต์</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-gray-800" id="valPercent">0</span>
                                <span class="text-xl font-bold text-gray-600">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-600 text-2xl shrink-0">⭐</div>
                        <div>
                            <p class="text-sm font-bold text-gray-400 uppercase tracking-wider">คะแนนเฉลี่ย</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-gray-800" id="valAvgScore">0</span>
                                <span class="text-xl font-bold text-gray-600">คะแนน</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">ความคืบหน้าแยกตามช่องทาง (Channels)</h2>
                        <div id="channelList" class="space-y-4"></div>
                    </div>

                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 h-fit">
                        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">ส่งออกรายงาน (Export)</h2>
                        <div class="space-y-4">
                            <button onclick="exportFile('downloadTrackingExcel')" id="btnTrack" class="w-full bg-slate-800 hover:bg-slate-900 text-white p-4 rounded-xl font-bold text-sm transition flex flex-col items-center justify-center gap-1 shadow-md">
                                <span class="text-xl">📥</span>
                                ดาวน์โหลด Excel: ติดตามสอบ
                                <span class="text-xs font-normal text-slate-300">รายชื่อพนักงานที่ยังไม่เข้าสอบ</span>
                            </button>

                            <button onclick="exportFile('downloadResultsExcel')" id="btnResult" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold text-sm transition flex flex-col items-center justify-center gap-1 shadow-md">
                                <span class="text-xl">📊</span>
                                ดาวน์โหลด Excel: สรุปผลสอบ
                                <span class="text-xs font-normal text-blue-200">คะแนนเฉลี่ยและคนผ่านเกณฑ์</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx6Qq3EJQ41GWV5wzK3_h8rSjpZkvUVl7GHXIEJ2zdl-Iu5GyUBMOJDJud5ywMe1z5lZQ/exec"; 

        async function fetchGAS(action, args = []) {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST', body: JSON.stringify({ action: action, args: args })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.result;
        }

        window.onload = loadDashboardData;

        async function loadDashboardData() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');

            try {
                const data = await fetchGAS('getAdminDashboardData');
                
                document.getElementById('valTested').innerText = data.totalTested.toLocaleString();
                document.getElementById('valTarget').innerText = data.totalTarget.toLocaleString();
                document.getElementById('valPercent').innerText = data.percentTotal;
                document.getElementById('valAvgScore').innerText = data.avgScore;

                const channelContainer = document.getElementById('channelList');
                channelContainer.innerHTML = '';
                
                let chArray = [];
                for (let ch in data.channelStats) {
                    const stats = data.channelStats[ch];
                    const pct = stats.target > 0 ? Math.round((stats.tested / stats.target) * 100) : 0;
                    chArray.push({ name: ch, tested: stats.tested, target: stats.target, percent: pct });
                }
                chArray.sort((a, b) => b.percent - a.percent);

                chArray.forEach(ch => {
                    let colorClass = ch.percent >= 80 ? 'bg-green-500' : (ch.percent >= 50 ? 'bg-yellow-400' : 'bg-red-500');
                    channelContainer.innerHTML += `
                        <div>
                            <div class="flex justify-between text-sm font-bold text-gray-700 mb-1">
                                <span>${ch.name} <span class="text-gray-400 font-normal ml-1">(${ch.tested}/${ch.target})</span></span>
                                <span>${ch.percent}%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2.5">
                                <div class="${colorClass} h-2.5 rounded-full transition-all duration-1000" style="width: ${ch.percent}%"></div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
            }
        }

        async function exportFile(actionName) {
            const btnId = actionName === 'downloadTrackingExcel' ? 'btnTrack' : 'btnResult';
            const btn = document.getElementById(btnId);
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = `<div class="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div> กำลังสร้างไฟล์...`;
            btn.disabled = true;

            try {
                const result = await fetchGAS(actionName);
                
                const byteCharacters = atob(result.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
                
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = result.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
