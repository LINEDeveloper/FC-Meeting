<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .glass-card { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <header class="bg-white border-b border-gray-100 shadow-sm py-4 px-6 md:px-10 shrink-0 flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-4">
            <img src="https://img2.pic.in.th/True--C.png" class="h-8 md:h-9 w-auto drop-shadow-sm" alt="True Logo">
            <div class="h-8 w-px bg-gray-200 hidden md:block"></div>
            <div>
                <h1 class="text-lg md:text-xl font-extrabold text-gray-800 leading-none tracking-tight">Admin Dashboard</h1>
                <p class="text-[11px] md:text-xs text-red-600 font-bold uppercase tracking-wider mt-1">FC Meeting Quiz</p>
            </div>
        </div>
        <button onclick="loadDashboardData()" class="flex items-center justify-center w-10 h-10 bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-600 rounded-full transition-colors duration-200">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
        <div class="max-w-6xl mx-auto space-y-8">
            
            <div id="loadingState" class="flex flex-col items-center justify-center py-24">
                <div class="relative w-16 h-16 mb-4">
                    <div class="absolute inset-0 rounded-full border-4 border-gray-100"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-red-600 animate-spin"></div>
                </div>
                <p class="text-gray-500 font-medium tracking-wide">กำลังเตรียมข้อมูลสรุป...</p>
            </div>

            <div id="dashboardContent" class="hidden space-y-8 animate-[fade-in-up_0.5s_ease-out]">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    
                    <div class="bg-white rounded-3xl p-6 glass-card border border-gray-50 flex items-center gap-5 transition hover:-translate-y-1 duration-300">
                        <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center text-red-600 shrink-0">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">เข้าสอบแล้ว / เป้าหมาย</p>
                            <div class="flex items-baseline gap-1.5">
                                <span class="text-3xl font-black text-gray-800 tracking-tight" id="valTested">0</span>
                                <span class="text-sm font-bold text-gray-400">/ <span id="valTarget">0</span></span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl p-6 glass-card border border-gray-50 flex items-center gap-5 transition hover:-translate-y-1 duration-300">
                        <div class="w-14 h-14 rounded-2xl bg-gray-50 flex items-center justify-center text-gray-700 shrink-0">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">สัดส่วนผู้เข้าสอบ</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-gray-800 tracking-tight" id="valPercent">0</span>
                                <span class="text-lg font-bold text-gray-500">%</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl p-6 glass-card border border-gray-50 flex items-center gap-5 transition hover:-translate-y-1 duration-300">
                        <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center text-red-600 shrink-0">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">คะแนนเฉลี่ย</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-gray-800 tracking-tight" id="valAvgScore">0</span>
                                <span class="text-sm font-bold text-gray-500">คะแนน</span>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    
                    <div class="xl:col-span-2 bg-white rounded-3xl p-6 md:p-8 glass-card border border-gray-50">
                        <div class="flex justify-between items-end mb-6 border-b border-gray-100 pb-4">
                            <div>
                                <h2 class="text-lg font-extrabold text-gray-800">สรุปการสอบแยกตามช่องทาง</h2>
                                <p class="text-xs text-gray-400 mt-1">Completion Progress by Channel</p>
                            </div>
                        </div>
                        <div id="channelList" class="space-y-5"></div>
                    </div>

                    <div class="bg-white rounded-3xl p-6 md:p-8 glass-card border border-gray-50 h-fit flex flex-col">
                        <div class="mb-6 border-b border-gray-100 pb-4">
                            <h2 class="text-lg font-extrabold text-gray-800">ดาวน์โหลดรายงาน</h2>
                            <p class="text-xs text-gray-400 mt-1">Export Data to Excel</p>
                        </div>
                        
                        <div class="space-y-5">
                            <button onclick="exportFile('downloadResultsExcel')" id="btnResult" class="relative overflow-hidden w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white p-5 rounded-2xl font-bold text-sm transition-all transform active:scale-95 shadow-lg shadow-red-200 flex items-center gap-4 group">
                                <div class="bg-white/20 p-3 rounded-xl shrink-0 group-hover:scale-110 transition">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                </div>
                                <div class="text-left">
                                    <span class="block text-base flex items-center gap-2">สรุปผลการสอบ <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></span>
                                    <span class="block text-xs font-normal text-red-100 mt-0.5">คะแนนเฉลี่ย และผลการผ่านเกณฑ์</span>
                                </div>
                            </button>

                            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">ดาวน์โหลดแยกช่องทาง (ติดตามสอบ)</label>
                                
                                <select id="channelSelect" class="w-full bg-white border border-gray-200 text-gray-700 text-sm font-medium rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 transition mb-3 cursor-pointer shadow-sm">
                                    <option value="All">รวมทุกช่องทาง (All Channels)</option>
                                </select>

                                <button onclick="exportTracking()" id="btnTrack" class="w-full bg-white border-2 border-gray-200 hover:border-red-500 hover:bg-red-50 text-gray-700 hover:text-red-600 p-4 rounded-xl font-bold text-sm transition-all transform active:scale-95 flex items-center gap-4 group shadow-sm">
                                    <div class="bg-gray-100 group-hover:bg-white p-2.5 rounded-xl shrink-0 text-gray-500 group-hover:text-red-500 transition">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                    </div>
                                    <div class="text-left flex-1">
                                        <span class="block text-[15px]">ติดตามพนักงาน</span>
                                        <span class="block text-[11px] font-normal text-gray-400 group-hover:text-red-400 mt-0.5">โหลดตามช่องทางที่เลือกด้านบน</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx6Qq3EJQ41GWV5wzK3_h8rSjpZkvUVl7GHXIEJ2zdl-Iu5GyUBMOJDJud5ywMe1z5lZQ/exec"; 

        async function fetchGAS(action, args = []) {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST', body: JSON.stringify({ action: action, args: args })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.result;
        }

        window.onload = loadDashboardData;

        async function loadDashboardData() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');

            try {
                const data = await fetchGAS('getAdminDashboardData');
                
                document.getElementById('valTested').innerText = data.totalTested.toLocaleString();
                document.getElementById('valTarget').innerText = data.totalTarget.toLocaleString();
                document.getElementById('valPercent').innerText = data.percentTotal;
                document.getElementById('valAvgScore').innerText = data.avgScore;

                const channelContainer = document.getElementById('channelList');
                const channelSelect = document.getElementById('channelSelect');
                channelContainer.innerHTML = '';
                channelSelect.innerHTML = '<option value="All">รวมทุกช่องทาง (All Channels)</option>';
                
                let chArray = [];
                for (let ch in data.channelStats) {
                    const stats = data.channelStats[ch];
                    const pct = stats.target > 0 ? Math.round((stats.tested / stats.target) * 100) : 0;
                    chArray.push({ name: ch, tested: stats.tested, target: stats.target, percent: pct });
                }
                chArray.sort((a, b) => b.percent - a.percent);

                chArray.forEach(ch => {
                    channelContainer.innerHTML += `
                        <div class="group">
                            <div class="flex justify-between items-end text-sm font-bold text-gray-700 mb-2">
                                <span class="group-hover:text-red-600 transition-colors">${ch.name} <span class="text-gray-400 font-medium ml-1">(${ch.tested}/${ch.target})</span></span>
                                <span class="text-red-600">${ch.percent}%</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                                <div class="bg-gradient-to-r from-red-500 to-red-600 h-full rounded-full transition-all duration-1000 ease-out" style="width: ${ch.percent}%"></div>
                            </div>
                        </div>
                    `;
                    channelSelect.innerHTML += `<option value="${ch.name}">${ch.name}</option>`;
                });

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
                document.getElementById('loadingState').innerHTML = `<p class="text-red-500 font-bold text-center">โหลดข้อมูลไม่สำเร็จ<br><button onclick="loadDashboardData()" class="mt-4 underline text-sm text-gray-500 hover:text-red-600">ลองใหม่อีกครั้ง</button></p>`;
            }
        }

        function exportTracking() {
            const selectedChannel = document.getElementById('channelSelect').value;
            exportFile('downloadTrackingExcel', [selectedChannel]);
        }

        async function exportFile(actionName, args = []) {
            // === ระบบความปลอดภัย: ตรวจสอบรหัสผ่านเฉพาะปุ่มสรุปผลสอบ ===
            if (actionName === 'downloadResultsExcel') {
                const password = prompt("กรุณากรอกรหัสผ่านเพื่อยืนยันการดาวน์โหลด (สรุปผลการสอบ):");
                if (password !== "FC2026") {
                    if (password !== null) { // แจ้งเตือนเมื่อกรอกผิด (ไม่แจ้งถ้ากด Cancel)
                        alert("❌ รหัสผ่านไม่ถูกต้อง ไม่อนุญาตให้ดาวน์โหลดข้อมูล");
                    }
                    return; // ยกเลิกการดาวน์โหลดทันที
                }
            }
            // =======================================================

            const btnId = actionName === 'downloadTrackingExcel' ? 'btnTrack' : 'btnResult';
            const btn = document.getElementById(btnId);
            const originalHtml = btn.innerHTML;
            
            if (actionName === 'downloadResultsExcel') {
                btn.innerHTML = `<div class="animate-spin rounded-full h-6 w-6 border-b-2 border-white mx-auto"></div>`;
            } else {
                btn.innerHTML = `<div class="animate-spin rounded-full h-6 w-6 border-b-2 border-red-500 mx-auto"></div>`;
            }
            btn.disabled = true;

            try {
                const result = await fetchGAS(actionName, args);
                
                const byteCharacters = atob(result.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
                
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = result.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (err) {
                alert("แจ้งเตือน: " + err.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
